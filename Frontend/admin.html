<!DOCTYPE html>
<html>
<head>
  <title>Signalist Admin Dashboard</title>

  <style>
    body{
      font-family:Arial;
      background:#f4f7f6;
      padding:30px;
    }

    h1{
      color:#1D9E75;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 3px 10px rgba(0,0,0,.08);
    }

    .number{
      font-size:40px;
      font-weight:bold;
      color:#1D9E75;
    }
  </style>
</head>

<body>

<h1>📊 Signalist Admin Dashboard</h1>

<div class="grid">

  <div class="card">
    <h3>Total Users</h3>
    <div class="number" id="users">0</div>
  </div>

  <div class="card">
    <h3>Total Predictions</h3>
    <div class="number" id="predictions">0</div>
  </div>

  <div class="card">
    <h3>Watchlist Items</h3>
    <div class="number" id="watchlist">0</div>
  </div>

  <div class="card">
    <h3>Portfolio Holdings</h3>
    <div class="number" id="portfolio">0</div>
  </div>

</div>

<script>

async function loadStats(){

  try{

    const res = await fetch(
      "http://127.0.0.1:5000/api/admin/stats"
    );

    const data = await res.json();

    document.getElementById("users").textContent =
      data.totalUsers;

    document.getElementById("predictions").textContent =
      data.totalPredictions;

    document.getElementById("watchlist").textContent =
      data.totalWatchlist;

    document.getElementById("portfolio").textContent =
      data.totalPortfolio;

  }catch(error){

    console.error(error);
    alert("Could not load admin stats");
  }
}

loadStats();

</script>

</body>
</html>
